version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag-app-cpu:
    build:
      context: .
      args:
        USE_GPU: "false"
    container_name: pharma_rag_ui_cpu
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./src:/app/src
      - hf_cache:/root/.cache/huggingface
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      - qdrant
    restart: unless-stopped
    profiles:
      - cpu

  rag-app-gpu:
    build:
      context: .
      args:
        USE_GPU: "true"
    container_name: pharma_rag_ui_gpu
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./src:/app/src
      - hf_cache:/root/.cache/huggingface
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      - qdrant
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

volumes:
  qdrant_data:
  hf_cache:
  fastembed_cache:
